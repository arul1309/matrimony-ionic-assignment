<ion-card class="daily-card">
  <ion-img class="daily-image" [src]="profile.image"></ion-img>

  <ion-badge class="photo-count">
    <ion-icon name="camera-outline"></ion-icon>
    <ion-label>{{ imageCount }}</ion-label>
  </ion-badge>

  <ion-card-content class="daily-content">
    <ion-row class="meta-row">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <ion-label>Verified</ion-label>
      <ion-icon name="sparkles-outline"></ion-icon>
      <ion-label>Premium NRI</ion-label>
    </ion-row>

    <ion-text class="name">
      <ion-label>{{ profile.name }}</ion-label>
    </ion-text>

    <ion-text class="details">
      <ion-label>{{ detailsLine }}</ion-label>
    </ion-text>

    <ion-row class="action-strip" align-items-center>
      <ion-col size="auto" class="shortlist-col">
        <ion-button fill="clear" class="shortlist-btn" (click)="shortlist.emit()" aria-label="Shortlist">
          <ion-icon name="star-outline"></ion-icon>
          <ion-label>Shortlist</ion-label>
        </ion-button>
      </ion-col>

      <ion-col class="like-label-col">
        <ion-text class="like-label">
          <ion-label>Like her?</ion-label>
        </ion-text>
      </ion-col>

      <ion-col size="auto" class="action-right-col">
        <ion-row class="action-right">
          <ion-button fill="outline" shape="round" class="reject-btn" (click)="reject.emit()"
            aria-label="Not Interested">
            <ion-icon slot="icon-only" name="close-outline" aria-hidden="true"></ion-icon>
          </ion-button>
          <ion-button fill="solid" shape="round" class="like-btn" (click)="like.emit()" aria-label="Interested">
            <ion-icon slot="icon-only" name="checkmark" aria-hidden="true"></ion-icon>
          </ion-button>
        </ion-row>
      </ion-col>
    </ion-row>
  </ion-card-content>
</ion-card>
