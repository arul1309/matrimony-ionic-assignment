<ion-card class="profile-card">
  <ion-img #photoRef class="profile-image" [src]="profile.image" (click)="onOpen($event)">
  </ion-img>
  <ion-card-content class="profile-card-content">
    <ion-row class="micro-badges">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <ion-label>Verified</ion-label>
      <ion-icon name="sparkles-outline"></ion-icon>
      <ion-label>Premium NRI</ion-label>
    </ion-row>
    <ion-text class="profile-name">
      <ion-label>{{ profile.name }}</ion-label>
    </ion-text>
    <ion-text class="profile-details">
      <ion-label>{{ detailsText }}</ion-label>
    </ion-text>

    <ion-row class="yesno-grid" aria-label="Actions">
      <ion-button class="btn-yes-pill" (click)="onOpen($event)">Yes</ion-button>
      <ion-button class="btn-no-pill" (click)="onReject($event)">No</ion-button>
    </ion-row>
  </ion-card-content>
</ion-card>
