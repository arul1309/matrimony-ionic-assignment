<ion-app>
  <ion-menu class="main-app-menu" menuId="main-menu" contentId="main-content" [swipeGesture]="false">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
        <ion-buttons slot="end">
          <ion-menu-toggle menu="main-menu">
            <ion-button fill="clear" color="light" aria-label="Close menu">
              <ion-icon slot="icon-only" name="close" aria-hidden="true"></ion-icon>
            </ion-button>
          </ion-menu-toggle>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list lines="none">
        <ion-menu-toggle auto-hide="true">
          <ion-item class="menu-nav-item" [class.menu-nav-item--active]="isPendingMenuActive()"
            [attr.aria-current]="isPendingMenuActive() ? 'page' : null" button routerLink="/pending-profiles"
            routerDirection="root" detail="false" lines="none">
            <ion-icon slot="start" name="albums-outline" aria-hidden="true"></ion-icon>
            <ion-label>Pending Profiles</ion-label>
          </ion-item>
        </ion-menu-toggle>
        <ion-menu-toggle auto-hide="true">
          <ion-item class="menu-nav-item" [class.menu-nav-item--active]="isDailyMenuActive()"
            [attr.aria-current]="isDailyMenuActive() ? 'page' : null" button routerLink="/daily-recommendations"
            routerDirection="root" detail="false" lines="none">
            <ion-icon slot="start" name="sparkles-outline" aria-hidden="true"></ion-icon>
            <ion-label>Daily Recommendations</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
