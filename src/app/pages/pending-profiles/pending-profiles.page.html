<ion-header class="pending-header">
  <ion-toolbar class="main-toolbar">
    <ion-title class="header-brand">{{ appName }}</ion-title>
  </ion-toolbar>
  <ion-toolbar class="sub-header">
    <ion-title class="pending-title">
      <span class="pending-line">
        <ion-text class="pending-section"><ion-label>My Matches</ion-label></ion-text>
        <ion-text class="pending-text"><ion-label>{{ pendingCount }} profiles pending with me</ion-label></ion-text>
        <ion-badge class="new-badge" *ngIf="newCount > 0">{{ newCount }} NEW</ion-badge>
      </span>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="pending-content no-scroll" [fullscreen]="true" [scrollY]="false">
  <div class="stack-viewport" *ngIf="hasCurrentProfile">
    <div class="stack-container">
      <div
        *ngFor="let peek of peekCards"
        class="stack-layer stack-back"
        [ngClass]="'stack-back-' + peek.side">
        <ion-card class="stack-peek-card">
          <ion-img [src]="peek.profile.image" alt=""></ion-img>
          <ion-card-content class="peek-name-wrap">
            <ion-text class="peek-name"><ion-label>{{ peek.profile.name }}</ion-label></ion-text>
          </ion-card-content>
        </ion-card>
      </div>
      <div class="stack-layer stack-front" [ngClass]="frontCardClasses">
        <ion-card class="stack-card-wrap">
          <app-profile-card
            #profileCardRef
            [profile]="profiles[index]"
            (like)="interested()"
            (reject)="reject()"
            (shortlist)="shortlist()"
            (open)="openProfile()">
          </app-profile-card>
        </ion-card>
      </div>
    </div>
  </div>

  <div class="empty-state-wrap" *ngIf="!hasCurrentProfile">
    <ion-card class="empty-card">
      <ion-card-content>
        <ion-text color="medium">
          <ion-label class="empty-label">No more profiles to show.</ion-label>
        </ion-text>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
