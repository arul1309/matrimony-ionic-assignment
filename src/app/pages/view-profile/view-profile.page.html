<ng-container *ngIf="profile">
  <ion-header mode="ios">
    <ion-toolbar class="view-profile-toolbar">
      <ion-buttons slot="start">
        <ion-back-button defaultHref="/pending-profiles" text=""></ion-back-button>
      </ion-buttons>
      <ion-title class="profile-id-title" *ngIf="profileId">{{ profileId }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="view-profile-content" [fullscreen]="true">
    <div class="profile-body">
      <div class="hero-section">
        <div class="hero-wrap">
          <div #imageScroller class="image-scroller" (scroll)="onMobileImageScroll()">
            <div class="image-page" *ngFor="let img of images; let i = index">
              <ion-img class="profile-hero-img" [src]="img" alt="Profile"></ion-img>
            </div>
          </div>

          <ion-button class="img-nav img-nav-prev" fill="solid" (click)="prevImage()" [disabled]="images.length < 2"
            aria-label="Previous image">
            <ion-icon name="chevron-back"></ion-icon>
          </ion-button>

          <ion-button class="img-nav img-nav-next" fill="solid" (click)="nextImage()" [disabled]="images.length < 2"
            aria-label="Next image">
            <ion-icon name="chevron-forward"></ion-icon>
          </ion-button>
        </div>
      </div>

      <ion-card class="bottom-sheet">
        <ion-card-content class="bottom-content">
          <ion-text class="detail-name">
            <ion-label>{{ profile.name }}</ion-label>
          </ion-text>

          <ion-text class="summary-line">
            <ion-label>{{ detailsLine }}</ion-label>
          </ion-text>

          <ion-list *ngIf="basicInfoRows.length" lines="none" class="info-list">
            <ion-item *ngFor="let row of basicInfoRows" lines="none">
              <ion-label>
                <ion-text color="medium" class="info-key">{{ row.key }}</ion-text>
                <ion-text class="info-value">{{ row.value }}</ion-text>
              </ion-label>
            </ion-item>
          </ion-list>

          <ion-list *ngIf="professionalRows.length" lines="none" class="info-list">
            <ion-item *ngFor="let row of professionalRows" lines="none">
              <ion-label>
                <ion-text color="medium" class="info-key">{{ row.key }}</ion-text>
                <ion-text class="info-value">{{ row.value }}</ion-text>
              </ion-label>
            </ion-item>
          </ion-list>

          <ion-list *ngIf="familyRows.length" lines="none" class="info-list">
            <ion-item *ngFor="let row of familyRows" lines="none">
              <ion-label>
                <ion-text color="medium" class="info-key">{{ row.key }}</ion-text>
                <ion-text class="info-value">{{ row.value }}</ion-text>
              </ion-label>
            </ion-item>
          </ion-list>

          <ion-item *ngIf="profile.about" lines="none" class="about-item">
            <ion-label class="ion-text-wrap">
              <ion-text color="medium" class="info-key">About</ion-text>
              <ion-text class="info-value about-text">{{ profile.about }}</ion-text>
            </ion-label>
          </ion-item>
        </ion-card-content>
      </ion-card>
    </div>
  </ion-content>

  <ion-footer class="view-profile-footer" mode="ios" translucent="false">
    <ion-toolbar class="view-profile-actions-toolbar">
      <div class="fixed-actions-strip">
        <ion-button class="view-yes-pill" fill="solid" shape="round" (click)="onInterest()">
          Yes
        </ion-button>
        <ion-button class="view-no-pill" fill="solid" shape="round" (click)="onIgnore()">
          No
        </ion-button>
      </div>
    </ion-toolbar>
  </ion-footer>
</ng-container>
